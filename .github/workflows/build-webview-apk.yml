name: Build WebView APK

on:
  push:
    paths:
      - '.github/workflows/build-webview-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        run: |
          PROJECT_DIR=$(find . -path "*/webview-app" -type d | head -1)
          echo "Project dir: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: countdown-wheel-webview-APK
          path: "**/webview-app/app/build/outputs/apk/debug/*.apk"
