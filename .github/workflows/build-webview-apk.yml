name: Build WebView APK

on:
  push:
    paths:
      - '瀹夊崜鐗堟湰/webview-app/**'
      - '.github/workflows/build-webview-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        working-directory: 瀹夊崜鐗堟湰/webview-app
        run: chmod +x gradlew 2>/dev/null || true

      - name: Generate Gradle wrapper
        working-directory: 瀹夊崜鐗堟湰/webview-app
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        working-directory: 瀹夊崜鐗堟湰/webview-app
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: countdown-wheel-webview-APK
          path: 瀹夊崜鐗堟湰/webview-app/app/build/outputs/apk/debug/*.apk

