name: Build APK (Android)
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --fix-missing \
            autoconf \
            automake \
            build-essential \
            cmake \
            git \
            libffi-dev \
            libltdl-dev \
            libncurses-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3-dev \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3.0"
          pip install buildozer

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-cache-v4-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-v4-${{ runner.os }}-

      - name: Build APK
        id: build
        run: |
          set -x
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          # 修复：NDK r28c 与 SDL2 不兼容，用 r25c 伪装成 r28c
          NDK25="$HOME/.buildozer/android/platform/android-ndk-r25c"
          NDK28="$HOME/.buildozer/android/platform/android-ndk-r28c"
          if [ ! -d "$NDK25" ]; then
            echo "=== 下载 NDK r25c ==="
            wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O /tmp/ndk.zip
            mkdir -p "$HOME/.buildozer/android/platform"
            unzip -q /tmp/ndk.zip -d "$HOME/.buildozer/android/platform"
            rm /tmp/ndk.zip
          fi
          # 创建符号链接：让 buildozer "以为" r28c 已存在（实际指向 r25c）
          rm -rf "$NDK28" 2>/dev/null || true
          ln -s "$NDK25" "$NDK28"
          echo "=== NDK 链接创建完成 ==="
          ls -la "$HOME/.buildozer/android/platform/" | grep ndk

          # 清理 buildozer 缓存，避免旧编译产物导致 Cython/Kivy 编译失败
          echo "=== 清理 buildozer 缓存 ==="
          rm -rf "$HOME/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a" 2>/dev/null || true
          rm -rf "$HOME/.buildozer/android/app" 2>/dev/null || true

          # 第一次编译（下载SDK/NDK，许可可能未被接受）
          set +o pipefail
          buildozer android debug 2>&1 | tee buildozer.log
          set -o pipefail

          # 检查APK是否真的产出了（buildozer退出码不可靠）
          APK_FILE=$(find . -name "*.apk" -not -path "*/.buildozer/*" 2>/dev/null | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "=== 无APK产出，接受SDK许可后重试 ==="
            SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"

            # 尝试多个可能的sdkmanager路径
            for SM in \
              "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
              "$SDK_ROOT/tools/bin/sdkmanager"; do
              if [ -f "$SM" ]; then
                echo "找到sdkmanager: $SM"
                yes | $SM --licenses --sdk_root="$SDK_ROOT" 2>&1 || true
              fi
            done

            echo "=== 重试编译 ==="
            buildozer android debug 2>&1 | tee -a buildozer.log
          fi

          # 最终检查APK是否存在
          APK_FILE=$(find . -name "*.apk" -not -path "*/.buildozer/*" 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "BUILD_EXIT=0" >> $GITHUB_OUTPUT
            echo "APK产出: $APK_FILE"
            ls -lh "$APK_FILE"
            exit 0
          else
            echo "BUILD_EXIT=1" >> $GITHUB_OUTPUT
            echo "错误：仍未找到APK！"
            exit 1
          fi
        shell: bash

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: buildozer.log

      - name: Find APK
        id: find_apk
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" -not -path "*/.buildozer/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find . -name "*.apk" 2>/dev/null || echo "No APK anywhere"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 倒计时轮盘-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
