name: Build APK (Android)
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --fix-missing \
            autoconf \
            automake \
            build-essential \
            cmake \
            git \
            libffi-dev \
            libltdl-dev \
            libncurses-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3-dev \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython
          pip install buildozer

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-cache-v3-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-v3-${{ runner.os }}-

      - name: Build APK
        id: build
        run: |
          set -x
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          which python3
          python3 --version
          which buildozer
          buildozer --version

          # 第一次编译：下载SDK/NDK，可能卡在许可证
          set +o pipefail
          buildozer android debug 2>&1 | tee buildozer.log
          BUILD_EXIT=$?
          set -o pipefail

          # 如果失败，手动接受SDK许可后重试
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== 首次编译失败（exit=$BUILD_EXIT），尝试接受SDK许可 ==="
            SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
            if [ -f "$SDK_ROOT/tools/bin/sdkmanager" ]; then
              echo "正在接受所有SDK许可..."
              yes | $SDK_ROOT/tools/bin/sdkmanager --licenses --sdk_root="$SDK_ROOT" 2>&1
              echo "=== 重新编译 ==="
              buildozer android debug 2>&1 | tee -a buildozer.log
              BUILD_EXIT=$?
            fi
          fi
          echo "BUILD_EXIT=$BUILD_EXIT" >> $GITHUB_OUTPUT
          exit $BUILD_EXIT
        shell: bash

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: buildozer.log

      - name: Find APK
        id: find_apk
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" -not -path "*/.buildozer/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find . -name "*.apk" 2>/dev/null || echo "No APK anywhere"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 倒计时轮盘-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
