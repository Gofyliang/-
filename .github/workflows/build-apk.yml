name: Build APK (Android)
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --fix-missing \
            autoconf \
            automake \
            build-essential \
            cmake \
            git \
            libffi-dev \
            libltdl-dev \
            libncurses-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3-dev \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-cache-v5-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-v5-${{ runner.os }}-

      - name: Build APK
        id: build
        run: |
          set -x
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          # 淇锛歂DK r28c 涓?SDL2 涓嶅吋瀹癸紝鐢?r25c 浼鎴?r28c
          NDK25="$HOME/.buildozer/android/platform/android-ndk-r25c"
          NDK28="$HOME/.buildozer/android/platform/android-ndk-r28c"
          if [ ! -d "$NDK25" ]; then
            echo "=== 涓嬭浇 NDK r25c ==="
            wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O /tmp/ndk.zip
            mkdir -p "$HOME/.buildozer/android/platform"
            unzip -q /tmp/ndk.zip -d "$HOME/.buildozer/android/platform"
            rm /tmp/ndk.zip
          fi
          # 鍒涘缓绗﹀彿閾炬帴锛氳 buildozer "浠ヤ负" r28c 宸插瓨鍦紙瀹為檯鎸囧悜 r25c锛?          rm -rf "$NDK28" 2>/dev/null || true
          ln -s "$NDK25" "$NDK28"
          echo "=== NDK 閾炬帴鍒涘缓瀹屾垚 ==="
          ls -la "$HOME/.buildozer/android/platform/" | grep ndk

          # 褰诲簳娓呯悊鏃х紦瀛橈紝纭繚 p4a develop 鍒嗘敮鍜?cython<3.0 鐢熸晥
          echo "=== 褰诲簳娓呯悊缂栬瘧缂撳瓨 ==="
          rm -rf "$HOME/.buildozer/android/platform/build-"* 2>/dev/null || true
          rm -rf "$HOME/.buildozer/android/platform/python-for-android" 2>/dev/null || true
          rm -rf ./.buildozer 2>/dev/null || true
          echo "=== 缂撳瓨娓呯悊瀹屾垚 ==="

          # 鎵嬪姩 clone p4a develop 鍒嗘敮锛坆uildozer 涓嶅皧閲?spec 閲岀殑 p4a.branch锛?          echo "=== 鎵嬪姩 clone p4a develop 鍒嗘敮 ==="
          git clone -b develop --single-branch --depth 1 \
            https://github.com/kivy/python-for-android.git \
            "$HOME/.buildozer/android/platform/python-for-android"
          echo "=== p4a develop clone 瀹屾垚 ==="

          # 绗竴娆＄紪璇戯紙涓嬭浇SDK/NDK锛岃鍙彲鑳芥湭琚帴鍙楋級
          set +o pipefail
          buildozer android debug 2>&1 | tee buildozer.log
          set -o pipefail

          # 妫€鏌PK鏄惁鐪熺殑浜у嚭浜嗭紙buildozer閫€鍑虹爜涓嶅彲闈狅級
          APK_FILE=$(find . -name "*.apk" -not -path "*/.buildozer/*" 2>/dev/null | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "=== 鏃燗PK浜у嚭锛屾帴鍙桽DK璁稿彲鍚庨噸璇?==="
            SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"

            # 灏濊瘯澶氫釜鍙兘鐨剆dkmanager璺緞
            for SM in \
              "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
              "$SDK_ROOT/tools/bin/sdkmanager"; do
              if [ -f "$SM" ]; then
                echo "鎵惧埌sdkmanager: $SM"
                yes | $SM --licenses --sdk_root="$SDK_ROOT" 2>&1 || true
              fi
            done

            echo "=== 閲嶈瘯缂栬瘧 ==="
            buildozer android debug 2>&1 | tee -a buildozer.log
          fi

          # 鏈€缁堟鏌PK鏄惁瀛樺湪
          APK_FILE=$(find . -name "*.apk" -not -path "*/.buildozer/*" 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "BUILD_EXIT=0" >> $GITHUB_OUTPUT
            echo "APK浜у嚭: $APK_FILE"
            ls -lh "$APK_FILE"
            exit 0
          else
            echo "BUILD_EXIT=1" >> $GITHUB_OUTPUT
            echo "閿欒锛氫粛鏈壘鍒癆PK锛?
            exit 1
          fi
        shell: bash

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: buildozer.log

      - name: Find APK
        id: find_apk
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" -not -path "*/.buildozer/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find . -name "*.apk" 2>/dev/null || echo "No APK anywhere"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 鍊掕鏃惰疆鐩?APK
          path: ${{ steps.find_apk.outputs.apk_path }}
